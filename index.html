<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lia-connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      #initial-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .spinner {
        position: relative;
        width: 40px;
        height: 40px;
      }

      .spinner-dot {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--dot-color, #e51536);
        top: 50%;
        left: 50%;
        animation: fade 0.8s linear infinite;
      }

      /* Place 8 dots in a circle */
      .spinner-dot:nth-child(1) {
        transform: rotate(0deg) translateY(-16px) translate(-50%, -50%);
        animation-delay: 0s;
      }
      .spinner-dot:nth-child(2) {
        transform: rotate(45deg) translateY(-16px) translate(-50%, -50%);
        animation-delay: 0.1s;
      }
      .spinner-dot:nth-child(3) {
        transform: rotate(90deg) translateY(-16px) translate(-50%, -50%);
        animation-delay: 0.2s;
      }
      .spinner-dot:nth-child(4) {
        transform: rotate(135deg) translateY(-16px) translate(-50%, -50%);
        animation-delay: 0.3s;
      }
      .spinner-dot:nth-child(5) {
        transform: rotate(180deg) translateY(-16px) translate(-50%, -50%);
        animation-delay: 0.4s;
      }
      .spinner-dot:nth-child(6) {
        transform: rotate(225deg) translateY(-16px) translate(-50%, -50%);
        animation-delay: 0.5s;
      }
      .spinner-dot:nth-child(7) {
        transform: rotate(270deg) translateY(-16px) translate(-50%, -50%);
        animation-delay: 0.6s;
      }
      .spinner-dot:nth-child(8) {
        transform: rotate(315deg) translateY(-16px) translate(-50%, -50%);
        animation-delay: 0.7s;
      }

      @keyframes fade {
        0%,
        100% {
          opacity: 0.15;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="spinner">
        <div class="spinner-dot" style="--dot-color: #ed8524"></div>
        <div class="spinner-dot" style="--dot-color: #e6513d"></div>
        <div class="spinner-dot" style="--dot-color: #bc3989"></div>
        <div class="spinner-dot" style="--dot-color: #672d6a"></div>
        <div class="spinner-dot" style="--dot-color: #016098"></div>
        <div class="spinner-dot" style="--dot-color: #2c8abe"></div>
        <div class="spinner-dot" style="--dot-color: #019645"></div>
        <div class="spinner-dot" style="--dot-color: #1f5533"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
